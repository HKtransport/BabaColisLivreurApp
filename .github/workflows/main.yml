name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Clean Flutter
        working-directory: BabaColisLivreurApp
        run: flutter clean

      - name: Clean Android folder
        run: rm -rf BabaColisLivreurApp/android/.android

      - name: Install dependencies
        working-directory: BabaColisLivreurApp
        run: flutter pub get

      - name: Build APK
        working-directory: BabaColisLivreurApp
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: BabaColisLivreurApp/build/app/outputs/flutter-apk/app-release.apk
