plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace "com.babacolis.livreur"
    compileSdk 34

    defaultConfig {
        applicationId "com.babacolis.livreur"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
